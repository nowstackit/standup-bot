name: Standup Brief

on:
  schedule:
    - cron: "0 5 * * 1-5" # 05:00 UTC = 10:30 IST, Mon-Fri
  workflow_dispatch: # allow manual trigger

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger standup brief
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/cron/standup-brief"
